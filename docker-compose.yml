version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: donechain
    ports:
      - '5432:5432'
    volumes:
      - donechain_db_data:/var/lib/postgresql/data

volumes:
  donechain_db_data:
